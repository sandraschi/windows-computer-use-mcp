name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  check:
    name: Windows check
    runs-on: windows-latest
    env:
      CI: "true"
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff check
        run: uv run ruff check src tests

      - name: Pytest
        run: uv run pytest tests -q --tb=short -m "not e2e and not slow"

      - name: Import smoke
        run: uv run python -c "from windows_computer_use_mcp.app import app; print('ok')"
